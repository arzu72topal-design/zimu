<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>Zimu — Çevrimdışı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D0D12;
      color: #F9FAFB;
      font-family: 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 360px;
    }
    /* Nebula ambient orbs */
    .orb1, .orb2 {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    .orb1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
      top: -80px; left: -60px;
      animation: float1 12s ease-in-out infinite;
    }
    .orb2 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(168,85,247,0.10) 0%, transparent 70%);
      bottom: 20%; right: -50px;
      animation: float2 15s ease-in-out infinite;
    }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-20px)} }

    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: #1C1C26;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #e0d5f5, #a78bfa, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #9CA3AF;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .retry-btn {
      background: rgba(59,130,246,0.15);
      color: #3b82f6;
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .retry-btn:active {
      transform: scale(0.95);
      background: rgba(59,130,246,0.25);
    }
    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: #9CA3AF;
    }
  </style>
</head>
<body>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="container">
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-3.03M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Çevrimdışısın</h1>
    <p>İnternet bağlantın yok gibi görünüyor. Bağlantını kontrol edip tekrar dene.</p>
    <button class="retry-btn" onclick="location.reload()">Tekrar Dene</button>
    <div class="hint">Verileriniz güvende — bağlantı gelince senkronize olacak.</div>
  </div>
</body>
</html>
